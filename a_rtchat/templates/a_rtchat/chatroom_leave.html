{% extends 'layouts/box.html' %}

{% block content %}

<h1>Leave this chatroom?</h1>

<h2>{{ chat_group.groupchat_name|default:"Private Chat" }}</h2>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="button-red mt-4">Yes, leave</button>
    <a class="button button-gray ml-1" href="{% url 'chatroom' chat_group.group_name %}">Cancel</a>
</form>

{% endblock %}
